<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doublelag — Dashboard de Ingresos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --text: #f0f2ff;
    --text2: #8b90a8;
    --text3: #5a5f7a;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --yt: #ff0000;
    --dh: #f97316;
    --green: #22c55e;
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--text2); font-size: 15px; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
  }
  .card-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 8px; }
  .card-value { font-size: 30px; font-weight: 700; line-height: 1; }
  .card-sub { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .card-trend { font-size: 13px; margin-top: 6px; }
  .up { color: var(--green); }
  .down { color: var(--accent2); }
  .chart-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .chart-title { font-size: 17px; font-weight: 600; }
  .legend { display: flex; gap: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .chart-wrap { position: relative; width: 100%; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab {
    padding: 7px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .insight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .insight {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
  }
  .insight-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .insight-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .insight-row:last-child { border-bottom: none; }
  .insight-row .val { font-weight: 600; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .badge-orange { background: rgba(249,115,22,0.15); color: var(--dh); }
  .footer { text-align: center; color: var(--text3); font-size: 12px; margin-top: 32px; }
  .viral-banner {
    background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(255,107,107,0.1));
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .viral-icon { font-size: 36px; }
  .viral-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .viral-text p { font-size: 13px; color: var(--text2); }
  @media (max-width: 600px) {
    body { padding: 20px 16px; }
    .card-value { font-size: 24px; }
  }
</style>
</head>

  <div class="chart-wrap" style="height: 240px;">

        callbacks: {
          label: (item) => ' €' + item.raw.toFixed(0)
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: { color: '#8b90a8', font: { size: 12 }, autoSkip: false, maxRotation: 0 }
      },
      y: {
        grid: { color: 'rgba(255,255,255,0.06)' },
        ticks: { color: '#8b90a8', font: { size: 12 }, callback: v => '€' + v.toLocaleString('es-ES') }
      }
    }
  }
});

// Monthly breakdown table
const monthNames = ['Ago 25','Sep 25','Oct 25','Nov 25','Dic 25','Ene 26','Feb 26','Mar 26','Abr 26','May 26'];
const prevTotal = [totalData[0], ...totalData.slice(0, -1)];
const monthRows = allMonths.map((m, i) => {
  const diff = i === 0 ? null : totalData[i] - totalData[i-1];
  const badge = i === 0 ? '' :
    diff > 0 ? `<span class="badge badge-green">+€${diff.toFixed(0)}</span>` :
    `<span class="badge badge-red">€${diff.toFixed(0)}</span>`;
  return `<div class="insight-row">
    <span>${monthNames[i]}</span>
    <span style="display:flex;gap:8px;align-items:center">${badge}<span class="val">€${totalData[i].toFixed(0)}</span></span>
  </div>`;
}).join('');

document.getElementById('monthlyBreakdown').innerHTML = `
  <div class="insight-title"><span class="dot" style="background:#6c63ff"></span>Desglose mensual</div>
  ${monthRows}
`;
